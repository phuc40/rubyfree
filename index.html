<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BUSIDOL NEWS</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">
    <h1>🎁 Nhận Ruby</h1>

    <button onclick="getReward()">Vượt link nhận mã</button>

    <h2>Mã của bạn:</h2>
    <p id="code">---</p>

    <!-- ✨ PHẦN NHẬP MÃ + ID + NỀN TẢNG ✨ -->
    <div id="codeInputSection" class="code-input-section" style="display:none;">
        <h2 style="margin-top: 25px;">📝 Xác nhận thông tin</h2>
        <p class="sub" style="margin-top: 8px; margin-bottom: 15px;">Nhập ID và chọn nền tảng của bạn:</p>
        
        <!-- ID INPUT -->
        <div class="form-group">
            <label for="userIdInput" class="form-label">🆔 ID của bạn</label>
            <input 
                type="text" 
                id="userIdInput" 
                class="form-input"
                placeholder="Nhập ID của bạn" 
            >
        </div>

        <!-- PLATFORM SELECT -->
        <div class="form-group">
            <label for="platformSelect" class="form-label">📱 Chọn nền tảng</label>
            <select id="platformSelect" class="form-select">
                <option value="">-- Chọn nền tảng --</option>
                <option value="AMO">AMO</option>
                <option value="ATV">ATV</option>
                <option value="LG">LG</option>
            </select>
        </div>

        <!-- CODE INPUT -->
        <div class="form-group">
            <label for="userCodeInput" class="form-label">🔑 Mã nhận được</label>
            <input 
                type="text" 
                id="userCodeInput" 
                class="form-input"
                placeholder="Nhập mã " 
            >
        </div>
        
        <!-- SUBMIT BUTTON -->
        <button class="submit-btn" onclick="submitCode()">Gửi </button>
        
        <p id="submitStatus" class="submit-status"></p>
    </div>

    <p class="sub" style="margin-top: 20px;">📩 Hoặc gửi qua Facebook:</p>
    <a href="https://www.facebook.com/phuc.bon.chuc/" target="_blank" class="fb-btn">
        👉 Liên hệ Facebook
    </a>
</div>

<script src="script.js"></script>
</body>
</html>
