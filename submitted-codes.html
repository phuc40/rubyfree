<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Submitted Codes - BUSIDOL NEWS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== BODY ===== */
        body {
            font-family: Inter, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617 70%);
            color: #e5e7eb;
            padding: 20px;
            min-height: 100vh;
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.8),
                0 0 40px rgba(59,130,246,0.1);
        }

        /* ===== TITLE ===== */
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(2, 6, 23, 0.5);
        }

        thead {
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
        }

        th {
            padding: 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            color: #e5e7eb;
            word-break: break-word;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ===== BADGE ===== */
        .platform-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .platform-amo {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .platform-atv {
            background: rgba(168, 85, 247, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .platform-lg {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        /* ===== CODE ===== */
        .code-text {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fbbf24;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e5e7eb;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.4);
        }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            th, td {
                padding: 12px 8px;
                font-size: 12px;
            }

            .stats {
                gap: 10px;
            }

            .stat-card {
                min-width: 100px;
                padding: 12px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <a href="/" class="back-btn">← Quay lại</a>
    
    <h1>📊 Thông Tin Đã Gửi</h1>

    <!-- STATS -->
    <div class="stats" id="statsContainer">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Tổng Submissions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="amoCount">0</div>
            <div class="stat-label">AMO</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="atvCount">0</div>
            <div class="stat-label">ATV</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="lgCount">0</div>
            <div class="stat-label">LG</div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
        <table id="codesTable">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Platform</th>
                    <th>Code</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3" style="text-align: center; color: #6b7280;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <p>📭 Chưa có dữ liệu</p>
        <p style="font-size: 12px; color: #4b5563;">Hãy quay lại trang chính để gửi thông tin</p>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('/submitted-codes-api');
            const data = await response.json();

            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (!data || data.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('totalCount').textContent = '0';
                document.getElementById('amoCount').textContent = '0';
                document.getElementById('atvCount').textContent = '0';
                document.getElementById('lgCount').textContent = '0';
                return;
            }

            // Populate table
            tableBody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.userId || '---'}</td>
                    <td>
                        <span class="platform-badge platform-${item.platform.toLowerCase()}">
                            ${item.platform}
                        </span>
                    </td>
                    <td><span class="code-text">${item.code}</span></td>
                </tr>
            `).join('');

            // Calculate stats
            const total = data.length;
            const amo = data.filter(d => d.platform === 'AMO').length;
            const atv = data.filter(d => d.platform === 'ATV').length;
            const lg = data.filter(d => d.platform === 'LG').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('amoCount').textContent = amo;
            document.getElementById('atvCount').textContent = atv;
            document.getElementById('lgCount').textContent = lg;

            emptyState.style.display = 'none';
        } catch (err) {
            console.error('Error loading data:', err);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="text-align: center; color: #ef4444;">❌ Lỗi tải dữ liệu</td></tr>';
        }
    }

    // Load data on page load
    loadData();

    // Reload every 5 seconds
    setInterval(loadData, 5000);
</script>

</body>
</html>
