<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617 70%);
    color:#e5e7eb;
    padding:30px;
}

/* ===== TITLE ===== */
h1{
    text-align:center;
    margin-bottom:25px;
    font-size:26px;
    font-weight:600;

    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== FORM ===== */
input{
    width:100%;
    padding:12px;
    margin-bottom:12px;

    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);

    background:rgba(2,6,23,0.8);
    color:white;
}

/* ===== PREVIEW ===== */
#previewBox{
    display:none;
    margin-bottom:15px;
}

#preview{
    width:360px;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
}

/* ===== BUTTON ===== */
button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:500;

    background:linear-gradient(90deg,#3b82f6,#6366f1);
    color:white;

    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
    margin-top:25px;
}

/* ===== CARD ===== */
.item{
    background:rgba(15,23,42,0.6);
    border-radius:16px;
    overflow:hidden;

    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);

    transition:0.25s;
}

.item:hover{
    transform:translateY(-5px);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* ===== IMAGE ===== */
.item img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

/* ===== INFO ===== */
.info{
    padding:12px;
}

.info b{
    font-size:16px;
    display:block;
    margin-bottom:10px;
}

/* ===== ACTION ===== */
.actions{
    display:flex;
    gap:8px;
}

.delete{
    background:#ef4444;
}

.edit{
    background:#22c55e;
}
</style>
</head>

<body>

<h1>ADMIN SHOP</h1>

<input type="file" id="image" accept="image/*" onchange="previewImage()">

<div id="previewBox">
    <img id="preview">
</div>

<input type="text" id="price" placeholder="Giá">

<button onclick="upload()">Upload</button>

<div id="list" class="grid"></div>

<script>
function previewImage(){
    const file = document.getElementById("image").files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        document.getElementById("preview").src = e.target.result;
        document.getElementById("previewBox").style.display = "block";
    };

    reader.readAsDataURL(file);
}

async function upload(){
    const file = document.getElementById("image").files[0];
    const price = document.getElementById("price").value;

    if(!file || !price){
        return alert("Thiếu dữ liệu");
    }

    const form = new FormData();
    form.append("image", file);
    form.append("price", price);

    await fetch("/upload-acc", {
        method:"POST",
        body:form
    });

    // reset
    document.getElementById("image").value = "";
    document.getElementById("price").value = "";
    document.getElementById("previewBox").style.display = "none";

    load();
}

async function load(){
    const res = await fetch("/shop-acc");
    const data = await res.json();

    document.getElementById("list").innerHTML = data.map(acc=>`
        <div class="item">
            <img src="${acc.image}">
            <div class="info">
                <b>${acc.price}</b>
                <div class="actions">
                    <button class="edit" onclick="edit('${acc._id}')">Sửa</button>
                    <button class="delete" onclick="remove('${acc._id}')">Xoá</button>
                </div>
            </div>
        </div>
    `).join("");
}

async function remove(id){
    await fetch("/delete-acc",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id})
    });
    load();
}

async function edit(id){
    const price = prompt("Giá mới:");
    if(!price) return;

    await fetch("/update-acc",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id, price})
    });

    load();
}

load();
</script>

</body>
</html>
