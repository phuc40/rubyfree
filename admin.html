<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Shop</title>

<style>
body{
    font-family:Inter;
    background:#020617;
    color:white;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.item{
    background:#111;
    border-radius:12px;
    overflow:hidden;
}

.item img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

.info{
    padding:10px;
}

button{
    margin-top:5px;
    padding:5px 10px;
    border:none;
    cursor:pointer;
}

.delete{background:red;color:white}
.edit{background:green;color:white}
</style>
</head>

<body>

<h1>ADMIN SHOP</h1>

<input type="file" id="image">
<input type="text" id="price" placeholder="Giá">
<button onclick="upload()">Upload</button>

<div id="list" class="grid"></div>

<script>
async function upload(){
    const file = image.files[0];
    const price = priceInput.value;

    const form = new FormData();
    form.append("image", file);
    form.append("price", price);

    await fetch("/upload-acc", {
        method:"POST",
        body:form
    });

    load();
}

async function load(){
    const res = await fetch("/shop-acc");
    const data = await res.json();

    list.innerHTML = data.map(acc=>`
        <div class="item">
            <img src="${acc.image}">
            <div class="info">
                <b>${acc.price}</b><br>
                <button class="edit" onclick="edit('${acc._id}')">Sửa</button>
                <button class="delete" onclick="remove('${acc._id}')">Xoá</button>
            </div>
        </div>
    `).join("");
}

async function remove(id){
    await fetch("/delete-acc",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id})
    });
    load();
}

async function edit(id){
    const price = prompt("Giá mới:");
    if(!price) return;

    await fetch("/update-acc",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id, price})
    });
    load();
}

load();
</script>

</body>
</html>
